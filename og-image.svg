<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="AeroMind — Operational intelligence for electric aviation">
  <defs>
    <radialGradient id="g1" cx="80%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#5B9EFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="15%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#E89589" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#0A1628"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>
  <!-- horizon lines -->
  <g stroke="#5B9EFF" stroke-opacity="0.12" fill="none">
    <path d="M0 420 Q300 380 600 420 T1200 420"/>
    <path d="M0 460 Q300 430 600 460 T1200 460"/>
    <path d="M0 500 Q300 480 600 500 T1200 500"/>
  </g>
  <!-- corridor arcs -->
  <g fill="none" stroke-linecap="round">
    <path d="M180 480 C320 280 520 220 780 300" stroke="#94CFE8" stroke-width="2" stroke-opacity="0.45"/>
    <path d="M220 500 C400 300 640 200 980 280" stroke="#E89589" stroke-width="2" stroke-opacity="0.35"/>
    <path d="M140 510 C360 340 700 240 1060 320" stroke="#6EE7B7" stroke-width="1.5" stroke-opacity="0.3"/>
  </g>
  <circle cx="780" cy="300" r="6" fill="#6EE7B7"/>
  <circle cx="980" cy="280" r="5" fill="#5B9EFF"/>
  <circle cx="520" cy="250" r="4" fill="#E89589"/>
  <!-- wordmark -->
  <text x="96" y="250" font-family="Georgia, 'Times New Roman', serif" font-size="92" fill="#F4F2EE">
    <tspan font-style="italic">Aero</tspan><tspan fill="#5B9EFF">Mind</tspan>
  </text>
  <text x="96" y="320" font-family="Inter, Helvetica, Arial, sans-serif" font-size="28" fill="#B0BEDF">
    Operational intelligence for electric aviation
  </text>
  <text x="96" y="380" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" fill="#6B7B9F">
    Corridor economics · Per-aircraft state-of-health · Physics-first
  </text>
  <rect x="96" y="430" width="64" height="2" fill="#E89589"/>
</svg>
